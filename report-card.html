<!DOCTYPE html>
<html>

<head>

    <title>Report Card</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="report-card">

    <h1>Student Report Card</h1>

    <table>

        <tr>

            <th>Subject</th>
            <th>Marks</th>
            <th>Grade</th>

        </tr>

        <tr>

            <td>Mathematics</td>
            <td>95</td>
            <td>A+</td>

        </tr>

        <tr>

            <td>Physics</td>
            <td>88</td>
            <td>A</td>

        </tr>

    </table>

    <button onclick="window.print()">
        Download Report
    </button>

</div>

</body>
</html>
